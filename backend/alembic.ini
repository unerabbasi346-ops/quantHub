# =============================================================================
# Alembic configuration — Quant Hub
# Governing specification: Doc 09 §Migration Strategy (QH-009 v1.0)
# Per Doc 00 §14.11
#
# Usage:
#   cd backend/
#   alembic upgrade head          # apply all pending migrations
#   alembic downgrade -1          # roll back one revision
#   alembic revision --autogenerate -m "describe change"   # new migration
#   alembic current               # show current revision
#   alembic history               # list all revisions
#
# Database URL: set DATABASE_URL environment variable (never hardcode here).
# Doc 07 §Configuration: all runtime config from environment variables.
# Doc 09 §Security: credentials via environment variables only.
# =============================================================================

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# New migration file naming: YYYYMMDD_HHMM_slug.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Add backend/ to sys.path so env.py can import project packages if needed
prepend_sys_path = .

# Timestamps in migration files use UTC — P-13 Deterministic State
timezone = UTC

# Do not include the (empty) public schema in autogenerate
# include_schemas handled in env.py

# sqlalchemy.url is intentionally absent — env.py reads DATABASE_URL from environment


# =============================================================================
# Logging configuration
# =============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
